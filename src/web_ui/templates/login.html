<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login · J&T Dashboard</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: #0b1220;
            color: #e5e7eb;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at top, #13213a 0%, #0b1220 55%);
            padding: 20px;
        }
        .card {
            width: min(420px, 100%);
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
        }
        h1 {
            margin: 0 0 8px;
            font-size: 24px;
        }
        p {
            margin: 0 0 18px;
            color: #9ca3af;
            font-size: 14px;
        }
        form {
            display: grid;
            gap: 12px;
        }
        label {
            font-size: 12px;
            color: #cbd5e1;
            letter-spacing: 0.3px;
        }
        input {
            width: 100%;
            margin-top: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #f8fafc;
            border-radius: 10px;
            padding: 11px 12px;
            font-size: 14px;
            outline: none;
        }
        input:focus {
            border-color: #3b82f6;
        }
        button {
            margin-top: 6px;
            border: 0;
            border-radius: 10px;
            padding: 11px 14px;
            background: #ef4444;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.6;
            cursor: wait;
        }
        .error {
            min-height: 20px;
            color: #fda4af;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Acceso seguro</h1>
        <p>Ingresa tus credenciales para entrar al dashboard.</p>

        <form id="login-form">
            <label>
                Usuario
                <input id="username" type="text" autocomplete="username" required />
            </label>

            <label>
                Contraseña
                <input id="password" type="password" autocomplete="current-password" required />
            </label>

            <button id="submit-btn" type="submit">Entrar</button>
            <div id="error" class="error" role="alert"></div>
        </form>
    </main>

    <script>
        const form = document.getElementById('login-form');
        const userInput = document.getElementById('username');
        const passInput = document.getElementById('password');
        const submitBtn = document.getElementById('submit-btn');
        const errorEl = document.getElementById('error');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            errorEl.textContent = '';
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: userInput.value.trim(),
                        password: passInput.value,
                    }),
                });

                if (!response.ok) {
                    let message = 'No se pudo iniciar sesión.';
                    try {
                        const data = await response.json();
                        message = data.detail || message;
                    } catch (_) {}
                    throw new Error(message);
                }

                window.location.href = '/';
            } catch (error) {
                errorEl.textContent = error.message || 'Error de autenticación.';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
